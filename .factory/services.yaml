commands:
  install: npm install
  build: npm run build
  test: npm run test
  test:server: npm run test:server
  test:client: npm run test:client
  typecheck: npx tsc --noEmit -p packages/server/tsconfig.json && npx tsc --noEmit -p packages/client/tsconfig.json
  lint: npm run lint
  lint:fix: npm run lint:fix

services:
  api:
    start: cd /Users/andy/Documents/GitHub/org-planner && npm run dev:server
    stop: lsof -ti :3001 | xargs kill 2>/dev/null
    healthcheck: curl -s http://localhost:3001 >/dev/null 2>&1 && echo ok
    port: 3001
    depends_on: []

  web:
    start: cd /Users/andy/Documents/GitHub/org-planner && npm run dev:client
    stop: lsof -ti :5173 | xargs kill 2>/dev/null
    healthcheck: curl -sf http://localhost:5173 >/dev/null 2>&1 && echo ok
    port: 5173
    depends_on: [api]
