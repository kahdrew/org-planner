commands:
  install: cd /Users/andy/Documents/GitHub/org-planner && npm install
  build: cd /Users/andy/Documents/GitHub/org-planner && npm run build
  test: cd /Users/andy/Documents/GitHub/org-planner && npm run test
  test:server: cd /Users/andy/Documents/GitHub/org-planner && npm run test:server
  test:client: cd /Users/andy/Documents/GitHub/org-planner && npm run test:client
  typecheck: cd /Users/andy/Documents/GitHub/org-planner && npm run typecheck
  lint: cd /Users/andy/Documents/GitHub/org-planner && npm run lint
  lint:fix: cd /Users/andy/Documents/GitHub/org-planner && npm run lint:fix

services:
  api:
    start: cd /Users/andy/Documents/GitHub/org-planner && npm run dev:server
    stop: lsof -ti :3001 | xargs kill 2>/dev/null
    healthcheck: curl -sf http://localhost:3001/api/auth/login -X POST -H "Content-Type:application/json" -d '{}' >/dev/null 2>&1 && echo ok
    port: 3001
    depends_on: []

  web:
    start: cd /Users/andy/Documents/GitHub/org-planner && npm run dev:client
    stop: lsof -ti :5173 | xargs kill 2>/dev/null
    healthcheck: curl -sf http://localhost:5173 >/dev/null 2>&1 && echo ok
    port: 5173
    depends_on: [api]
